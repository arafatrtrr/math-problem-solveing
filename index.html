<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underestimate Calculator & Visualizer</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX compilation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex items-center justify-center p-4 md:p-8">

    <div id="root" class="w-full max-w-4xl"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [estimate, setEstimate] = useState(132);
            const [underestimatePct, setUnderestimatePct] = useState(25);

            // Calculations
            const estimatePct = 100 - underestimatePct;
            const actualValue = estimatePct > 0 ? (estimate / (estimatePct / 100)) : 0;
            const onePctValue = estimatePct > 0 ? (estimate / estimatePct) : 0;
            const gapValue = actualValue - estimate;

            return (
                <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden flex flex-col justify-between">
                    {/* Header */}
                    <div class="bg-gradient-to-r bg-slate-800 p-6 md:p-8 text-white">
                        <h1 class="text-2xl md:text-3xl font-bold">Attendance Estimator & Visualizer</h1>
                        <p class="text-slate-300 mt-2 text-sm md:text-base">
                            Deconstruct and solve percent underestimate word problems interactively.
                        </p>
                    </div>

                    <div class="p-6 md:p-8 space-y-8">
                        {/* Interactive Controls */}
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="block text-sm font-semibold text-gray-600">Estimated Value (e)</label>
                                <input 
                                    type="number" 
                                    value={estimate} 
                                    onChange={(e) => setEstimate(Math.max(0, parseFloat(e.target.value) || 0))}
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-500 focus:outline-none text-sm md:text-base"
                                />
                            </div>
                            <div class="space-y-2">
                                <label class="block text-sm font-semibold text-gray-600">Underestimate Percentage (%)</label>
                                <input 
                                    type="number" 
                                    value={underestimatePct} 
                                    onChange={(e) => setUnderestimatePct(Math.min(99, Math.max(0, parseFloat(e.target.value) || 0)))}
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-500 focus:outline-none text-sm md:text-base"
                                />
                            </div>
                        </div>

                        {/* Visual Rectangle Segment */}
                        <div class="space-y-4">
                            <h3 class="text-lg font-bold text-gray-700">Method 1: Visual Rectangle (100%)</h3>
                            
                            <div class="relative w-full h-24 bg-gray-100 rounded-xl overflow-hidden border border-gray-200 flex">
                                {/* Estimate Portion (75%) */}
                                <div 
                                    style={{ width: `${estimatePct}%` }}
                                    class="bg-blue-600 h-full flex flex-col justify-center items-center text-white transition-all duration-300 p-2 min-w-[60px]"
                                >
                                    <span class="font-bold text-[10px] md:text-xs uppercase tracking-wider opacity-90 text-center">
                                        Estimate ({estimatePct}%)
                                    </span>
                                    <span class="text-base md:text-xl font-extrabold mt-1 text-center">
                                        {estimate} people
                                    </span>
                                </div>
                                
                                {/* Underestimate Portion (25%) */}
                                <div 
                                    style={{ width: `${underestimatePct}%` }}
                                    class="bg-red-500 h-full flex flex-col justify-center items-center text-white transition-all duration-300 p-2 min-w-[60px]"
                                >
                                    <span class="font-bold text-[10px] md:text-xs uppercase tracking-wider opacity-90 text-center">
                                        Under ({underestimatePct}%)
                                    </span>
                                    <span class="text-base md:text-xl font-extrabold mt-1 text-center">
                                        {gapValue % 1 === 0 ? gapValue : gapValue.toFixed(1)} people
                                    </span>
                                </div>
                            </div>

                            {/* Redesigned Responsive Grid Legend */}
                            <div class="grid grid-cols-3 gap-2 pt-2 border-t border-gray-100 text-gray-500 text-xs md:text-sm font-medium">
                                <div class="text-left">
                                    <span class="block text-[10px] uppercase text-gray-400 font-semibold tracking-wider">Start</span>
                                    <span>0%</span>
                                </div>
                                <div class="text-center border-x border-gray-200 px-2">
                                    <span class="block text-[10px] uppercase text-gray-400 font-semibold tracking-wider">Separation Line</span>
                                    <span>{estimatePct}%</span>
                                </div>
                                <div class="text-right">
                                    <span class="block text-[10px] uppercase text-gray-400 font-semibold tracking-wider">Actual Total (100%)</span>
                                    <span class="text-gray-800 font-bold">{actualValue.toFixed(1).replace('.0', '')} people</span>
                                </div>
                            </div>
                        </div>

                        {/* Side-by-Side Methods */}
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4 border-t border-gray-100">
                            {/* Method 1 Breakdown */}
                            <div class="space-y-4">
                                <h4 class="text-md font-bold text-blue-800">Method 1: Arithmetic Steps</h4>
                                <div class="bg-blue-50 p-4 rounded-xl space-y-3 text-xs md:text-sm">
                                    <div>
                                        <p class="font-semibold text-gray-700">1. Calculate Estimate Portion:</p>
                                        <p class="font-mono text-gray-600">100% - {underestimatePct}% = {estimatePct}%</p>
                                    </div>
                                    <div>
                                        <p class="font-semibold text-gray-700">2. Find value of 1%:</p>
                                        <p class="font-mono text-gray-600">{estimate} ÷ {estimatePct} = {onePctValue.toFixed(4)}</p>
                                    </div>
                                    <div>
                                        <p class="font-semibold text-gray-700">3. Multiply by 100 to get total:</p>
                                        <p class="font-mono text-gray-600">{onePctValue.toFixed(4)} × 100 = <span class="font-bold text-blue-700">{actualValue.toFixed(2).replace('.00', '')}</span></p>
                                    </div>
                                </div>
                            </div>

                            {/* Method 2 Breakdown */}
                            <div class="space-y-4">
                                <h4 class="text-md font-bold text-red-800">Method 2: Algebraic Formulation</h4>
                                <div class="bg-red-50 p-4 rounded-xl space-y-3 text-xs md:text-sm">
                                    <div>
                                        <p class="font-semibold text-gray-700">1. Equation setup:</p>
                                        <p class="font-mono text-gray-600">a - {(underestimatePct / 100).toFixed(2)}a = {estimate}</p>
                                    </div>
                                    <div>
                                        <p class="font-semibold text-gray-700">2. Simplify coefficients:</p>
                                        <p class="font-mono text-gray-600">{(estimatePct / 100).toFixed(2)}a = {estimate}</p>
                                    </div>
                                    <div>
                                        <p class="font-semibold text-gray-700">3. Isolate variable (a):</p>
                                        <p class="font-mono text-gray-600">a = {estimate} ÷ {(estimatePct / 100).toFixed(2)} = <span class="font-bold text-red-700">{actualValue.toFixed(2).replace('.00', '')}</span></p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Interactive Result Card */}
                        <div class="bg-slate-100 p-5 rounded-xl flex flex-col items-center justify-center text-center space-y-1">
                            <span class="text-[10px] md:text-xs font-semibold tracking-wider text-slate-500 uppercase">Calculated Actual Attendance</span>
                            <span class="text-3xl md:text-4xl font-extrabold text-slate-800">{actualValue.toFixed(2).replace('.00', '')} people</span>
                        </div>
                    </div>

                    {/* Developer Links Footer */}
                    <div class="bg-slate-50 border-t border-gray-100 px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-4 text-xs md:text-sm text-gray-500">
                        <p class="font-medium">Created by Arafat</p>
                        <div class="flex items-center space-x-4">
                            <a 
                                href="https://www.instagram.com/arafat.trr" 
                                target="_blank" 
                                rel="noopener noreferrer" 
                                class="flex items-center space-x-1 hover:text-pink-600 transition-colors"
                            >
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.051.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
                                </svg>
                                <span class="font-semibold">Instagram</span>
                            </a>
                            <a 
                                href="https://github.com/arafatrtrr" 
                                target="_blank" 
                                rel="noopener noreferrer" 
                                class="flex items-center space-x-1 hover:text-black transition-colors"
                            >
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                                    <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
                                </svg>
                                <span class="font-semibold">GitHub</span>
                            </a>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

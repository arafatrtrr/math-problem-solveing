<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underestimate Calculator & Visualizer</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX compilation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex items-center justify-center p-4 md:p-8">

    <div id="root" class="w-full max-w-4xl"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [estimate, setEstimate] = useState(132);
            const [underestimatePct, setUnderestimatePct] = useState(25);

            // Calculations
            const estimatePct = 100 - underestimatePct;
            const actualValue = estimatePct > 0 ? (estimate / (estimatePct / 100)) : 0;
            const onePctValue = estimatePct > 0 ? (estimate / estimatePct) : 0;
            const gapValue = actualValue - estimate;

            return (
                <div class="space-y-6">
                    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
                        {/* Header */}
                        <div class="bg-gradient-to-r bg-slate-800 p-6 md:p-8 text-white">
                            <h1 class="text-2xl md:text-3xl font-bold">Attendance Estimator & Visualizer</h1>
                            <p class="text-slate-300 mt-2 text-sm md:text-base">
                                Deconstruct and solve percent underestimate word problems interactively.
                            </p>
                        </div>

                        <div class="p-6 md:p-8 space-y-8">
                            {/* Interactive Controls */}
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="space-y-2">
                                    <label class="block text-sm font-semibold text-gray-600">Estimated Value (e)</label>
                                    <input 
                                        type="number" 
                                        value={estimate} 
                                        onChange={(e) => setEstimate(Math.max(0, parseFloat(e.target.value) || 0))}
                                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-500 focus:outline-none"
                                    />
                                </div>
                                <div class="space-y-2">
                                    <label class="block text-sm font-semibold text-gray-600">Underestimate Percentage (%)</label>
                                    <input 
                                        type="number" 
                                        value={underestimatePct} 
                                        onChange={(e) => setUnderestimatePct(Math.min(99, Math.max(0, parseFloat(e.target.value) || 0)))}
                                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-500 focus:outline-none"
                                    />
                                </div>
                            </div>

                            {/* Visual Rectangle Segment */}
                            <div class="space-y-4">
                                <h3 class="text-lg font-bold text-gray-700">Method 1: Visual Rectangle (100%)</h3>
                                <div class="relative w-full h-24 bg-gray-100 rounded-xl overflow-hidden border border-gray-200 flex">
                                    <div 
                                        style={{ width: `${estimatePct}%` }}
                                        class="bg-blue-600 h-full flex flex-col justify-center items-center text-white transition-all duration-300 px-2 py-4 min-w-[50px]"
                                    >
                                        <span class="font-semibold text-[10px] sm:text-xs uppercase tracking-wider opacity-90 text-center">Estimate ({estimatePct}%)</span>
                                        <span class="text-sm sm:text-xl font-extrabold text-center mt-1">{estimate} people</span>
                                    </div>
                                    <div 
                                        style={{ width: `${underestimatePct}%` }}
                                        class="bg-red-500 h-full flex flex-col justify-center items-center text-white transition-all duration-300 px-2 py-4 min-w-[50px]"
                                    >
                                        <span class="font-semibold text-[10px] sm:text-xs uppercase tracking-wider opacity-90 text-center">Underestimate ({underestimatePct}%)</span>
                                        <span class="text-sm sm:text-xl font-extrabold text-center mt-1">{gapValue.toFixed(0)} people</span>
                                    </div>
                                </div>
                                
                                {/* Stable Grid Labels (Replaced Absolute Positioning to Fix Overlaps) */}
                                <div class="grid grid-cols-3 gap-2 text-center text-xs md:text-sm font-semibold mt-2 border-t border-gray-100 pt-3">
                                    <div class="text-left">
                                        <span class="block text-[10px] uppercase text-gray-400 font-bold tracking-wider">Start</span>
                                        <span class="text-gray-600">0%</span>
                                    </div>
                                    <div class="text-center">
                                        <span class="block text-[10px] uppercase text-blue-500 font-bold tracking-wider">Line Separation</span>
                                        <span class="text-blue-600">{estimatePct}%</span>
                                    </div>
                                    <div class="text-right">
                                        <span class="block text-[10px] uppercase text-red-500 font-bold tracking-wider">Actual Total (100%)</span>
                                        <span class="text-red-600">{actualValue.toFixed(0)}</span>
                                    </div>
                                </div>
                            </div>

                            {/* Side-by-Side Methods */}
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 pt-4 border-t border-gray-100">
                                {/* Method 1 Breakdown */}
                                <div class="space-y-4">
                                    <h4 class="text-md font-bold text-blue-800">Method 1: Arithmetic Steps</h4>
                                    <div class="bg-blue-50 p-4 rounded-xl space-y-3 text-sm md:text-base">
                                        <div>
                                            <p class="font-semibold text-gray-700">1. Calculate Estimate Portion:</p>
                                            <p class="font-mono text-gray-600">100% - {underestimatePct}% = {estimatePct}%</p>
                                        </div>
                                        <div>
                                            <p class="font-semibold text-gray-700">2. Find value of 1%:</p>
                                            <p class="font-mono text-gray-600">{estimate} ÷ {estimatePct} = {onePctValue.toFixed(4)}</p>
                                        </div>
                                        <div>
                                            <p class="font-semibold text-gray-700">3. Multiply by 100 to get total:</p>
                                            <p class="font-mono text-gray-600">{onePctValue.toFixed(4)} × 100 = <span class="font-bold text-blue-700">{actualValue.toFixed(2)}</span></p>
                                        </div>
                                    </div>
                                </div>

                                {/* Method 2 Breakdown */}
                                <div class="space-y-4">
                                    <h4 class="text-md font-bold text-red-800">Method 2: Algebraic Formulation</h4>
                                    <div class="bg-red-50 p-4 rounded-xl space-y-3 text-sm md:text-base">
                                        <div>
                                            <p class="font-semibold text-gray-700">1. Equation setup:</p>
                                            <p class="font-mono text-gray-600">a - {(underestimatePct / 100).toFixed(2)}a = {estimate}</p>
                                        </div>
                                        <div>
                                            <p class="font-semibold text-gray-700">2. Simplify coefficients:</p>
                                            <p class="font-mono text-gray-600">{(estimatePct / 100).toFixed(2)}a = {estimate}</p>
                                        </div>
                                        <div>
                                            <p class="font-semibold text-gray-700">3. Isolate variable (a):</p>
                                            <p class="font-mono text-gray-600">a = {estimate} ÷ {(estimatePct / 100).toFixed(2)} = <span class="font-bold text-red-700">{actualValue.toFixed(2)}</span></p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Interactive Result Card */}
                            <div class="bg-slate-100 p-6 rounded-xl flex flex-col items-center justify-center text-center space-y-1">
                                <span class="text-xs font-semibold tracking-wider text-slate-500 uppercase">Calculated Actual Attendance</span>
                                <span class="text-4xl font-extrabold text-slate-800">{actualValue.toFixed(2)} people</span>
                            </div>
                        </div>
                    </div>

                    {/* Instagram Footer Handle Link */}
                    <div class="text-center text-sm text-gray-500">
                        <span>Developed by </span>
                        <a 
                            href="https://www.instagram.com/arafat.trr" 
                            target="_blank" 
                            rel="noopener noreferrer" 
                            class="font-semibold text-slate-700 hover:text-blue-600 transition-colors inline-flex items-center gap-1 hover:underline"
                        >
                            @arafat.trr
                        </a>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
